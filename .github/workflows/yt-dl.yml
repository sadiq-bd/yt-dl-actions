name: yt-dl
on:
    repository_dispatch:
        types: [yt-dl-actions]

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            PAYLOADS: ${{ toJson(github.event.client_payload) }}
            UPLOAD_ENDPOINT: ${{ secrets.UPLOAD_ENDPOINT }}
            STAT_REPORTING_ENDPOINT: ${{ secrets.STAT_REPORTING_ENDPOINT }}
            YTDLP_ARGS: ${{ secrets.YTDLP_ARGS }}

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Initiate Environment
              run: |
                cat bin.tar.* | tar -xvJf -

                chmod +x -R bin

                mv bin/* /usr/local/bin

            - name: Download & Upload

              run: |

                mkdir tmp && cd tmp

                DWNLD_ID=$(echo $PAYLOADS | jq -r '.download_id')

                DWNLD_URL=$(echo $PAYLOADS | jq -r '.download_url')
                
                UPLD_ID=$(echo $PAYLOADS | jq -r '.upload_id')

                echo 'Downloading...'
              
                yt-dlp \
                    -f "bestvideo[vcodec^=avc1][ext=mp4]+bestaudio[ext=m4a]/bestvideo[ext=mp4]+bestaudio[ext=m4a]/best" \
                    --no-playlist \
                    --merge-output-format mp4 \
                    $YTDLP_ARGS \
                    "$DWNLD_URL" > /dev/null 2>&1 || export YT_ERR=1


                if [[ $YT_ERR -eq 1 ]]; then

                    echo "Error Downloading :("

                    curl -X POST "$STAT_REPORTING_ENDPOINT" \
                        -H "content-type:application/json" \
                        --data "{\"download_id\":\"$DWNLD_ID\",\"error\":true}" > /dev/null 2>&1

                else

                    echo "Download finished!"

                    DOWNLOADED_FILE=$(ls)

                    echo "Uploading..."

                    curl -F video=@"./tmp/$DOWNLOADED_FILE" \
                        -F caption="$DOWNLOADED_FILE" \
                        "$UPLOAD_ENDPOINT$UPLD_ID" > /dev/null 2>&1 || export UPLD_ERR=1

                    if [[ $UPLD_ERR -eq 1 ]]; then
                        echo "Error Uploading :("
                    else
                        echo "Upload finished!"
                    fi

                fi

            
            - name: Update Stat to Completed
              run: |
       
                curl -X POST "$STAT_REPORTING_ENDPOINT" \
                    -H "content-type:application/json" \
                    --data "{\"download_id\":\"$DWNLD_ID\",\"completed\":true}" > /dev/null 2>&1 || export STAT_ERR=1

                if [[ $STAT_ERR -eq 1 ]]; then
                    echo "Error Reporting completed status :("
                else
                    echo "Completed!"
                fi

